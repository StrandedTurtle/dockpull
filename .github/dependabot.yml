version: 2
updates:
  # GitHub Actions — low risk; bundle all bumps into one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    # `fix(deps): …` so release-please treats a bump as a patch and cuts a
    # release for it. Its default `build(deps)` type isn't release-worthy
    # (only feat/fix/perf bump), so dependency updates would land on main and
    # never ship a new tagged image/release.
    commit-message:
      prefix: "fix"
      include: "scope"

  # Server npm deps. Group safe minor+patch bumps into a single PR (auto-merged
  # once CI is green); majors come as individual PRs for manual review.
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      server-minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "fix"
      include: "scope"

  # Client npm deps — same grouping strategy.
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    groups:
      client-minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "fix"
      include: "scope"
