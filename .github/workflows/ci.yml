name: CI

on:
  push:
    branches: [main]
  # Validate PRs (incl. Dependabot) before merge — but NOT arbitrary branch
  # pushes, so only main and PRs targeting it run CI.
  pull_request:
    branches: [main]
  # Lets release-please.yml explicitly kick CI on its release branch: pushes
  # made with GITHUB_TOKEN (release-please's own commits) don't trigger the
  # `push`/`pull_request` events above, so without this the release PR would
  # never get required checks and auto-merge would stall forever.
  workflow_dispatch:

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test

  client:
    name: Client build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
