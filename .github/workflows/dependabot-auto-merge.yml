name: Dependabot auto-merge

# Automatically enable auto-merge for Dependabot patch/minor updates so they
# land without manual clicks once CI is green. Major bumps are left for manual
# review. Requires the repo setting "Allow auto-merge" to be enabled, and a
# branch-protection rule on main that requires the CI checks (so auto-merge
# actually waits for them).
#
# Triggered by ci.yml completing (workflow_run) rather than pull_request_target
# directly: a pull_request_target trigger unconditionally shows up as a check
# on every PR (reported "skipped" for anyone but Dependabot, since the actor
# filter can only live inside the job) — confusing noise on every human PR.
# workflow_run runs don't auto-attach as a PR check the same way, so this
# workflow stays invisible except for actual Dependabot runs.
#
# Classifying the update type is done by parsing the PR title's "from X to Y"
# rather than via dependabot/fetch-metadata: that action reads
# github.context.payload.pull_request, which a workflow_run event doesn't
# carry. A prior version of this workflow tried building a synthetic event
# file and pointing GITHUB_EVENT_PATH/GITHUB_EVENT_NAME at it via $GITHUB_ENV
# — confirmed live (on real Dependabot PRs #61/#62) that this doesn't work:
# the action always reported "Event payload missing pull_request key" despite
# the step's logged env showing the override, i.e. GitHub Actions doesn't let
# a later step's GITHUB_ENV write actually override those reserved variables
# for the following step. A same-major-version "from X.. to Y.." is treated
# as a safe patch/minor bump; anything else (a real major bump, or a
# multi-dependency grouped-PR title with no single from/to pair to parse) is
# left for manual review — the safe default when we can't classify it.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve the pull request for this run
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for this run's commit — nothing to do."
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for same-major-version bumps
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          TITLE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json title -q .title)
          FROM_MAJOR=$(echo "$TITLE" | grep -oP 'from v?\K\d+' | head -1)
          TO_MAJOR=$(echo "$TITLE" | grep -oP 'to v?\K\d+' | head -1)
          if [ -n "$FROM_MAJOR" ] && [ -n "$TO_MAJOR" ] && [ "$FROM_MAJOR" = "$TO_MAJOR" ]; then
            gh pr merge --auto --squash --repo "${{ github.repository }}" "$PR_NUMBER" \
              || echo "Auto-merge not enabled — turn on 'Allow auto-merge' in repo settings."
          else
            echo "\"$TITLE\" doesn't look like a same-major-version bump (or couldn't parse it) — leaving for manual review."
          fi
