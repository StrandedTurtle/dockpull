name: release-please

# Maintains a standing "Release PR" that accumulates feat:/fix:/deps: commits
# since the last release into a version bump + changelog (release-please-config.json
# controls which commit types count and where they land in CHANGELOG.md). Every
# push to main updates that one PR in place rather than opening a new one.
#
# The auto-merge step below merges that PR itself the moment required CI passes
# (same pattern as dependabot-auto-merge.yml), so a qualifying change on main
# becomes a tagged release with no manual version bump or `git tag` needed. That
# merge is what actually cuts the release: release-please creates the git tag +
# GitHub Release, which triggers release.yml's tag-triggered image publish
# (pinned :X.Y.Z / :X.Y images).
#
# Want a manual gate instead (open the PR, but decide yourself when to ship)?
# Delete the "Auto-merge the release PR" step below — everything else still
# works, you just click Merge on the PR when you're ready.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Authenticate as a real user (PAT) instead of the default GITHUB_TOKEN.
      # GitHub suppresses `push`/`pull_request`/`tags` workflow triggers for
      # events authored by GITHUB_TOKEN (anti-recursion), which meant ci.yml
      # never ran on the release PR and `gh pr merge --auto` below had no
      # required checks to wait on — confirmed live: a workflow_dispatch
      # dispatch of ci.yml produced check runs that *looked* green but GitHub's
      # required-status-check rule didn't recognize them (merge still failed
      # with "required status checks are expected"), because that rule only
      # counts checks tied to a genuine pull_request event. A PAT-authored
      # push isn't subject to the suppression, so it produces real
      # pull_request events and ci.yml runs and satisfies the rule natively.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      # Enabling auto-merge with GITHUB_TOKEN meant the merge GitHub performs
      # later (once checks pass) is still attributed to GITHUB_TOKEN, so that
      # merge push was ALSO suppressed — confirmed live: PR #52 and #55 both
      # auto-merged silently with no follow-up release-please run, and their
      # GitHub Releases only got published as a side effect of a later,
      # unrelated push. Use the PAT here too so the actual merge fires a real
      # push event and the next release-please run (which publishes the tag +
      # GitHub Release) happens immediately, not whenever some other push
      # happens to catch up on the backlog.
      - name: Auto-merge the release PR once it's open
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "$PR_NUMBER" \
            || echo "Auto-merge not enabled — turn on 'Allow auto-merge' in repo settings, or merge #$PR_NUMBER manually."

      # No separate pinned-image dispatch step needed: since release-please
      # creates the tag using the PAT (not GITHUB_TOKEN), the tag push isn't
      # suppressed and release.yml's own `tags: ["v*"]` trigger fires on its
      # own — confirmed live for v1.3.2, pinned :X.Y.Z/:X.Y images built and
      # published to GHCR with no dispatch required.
